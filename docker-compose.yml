services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: opportunity-radar-alpha-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alpha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alpha_local_only}
      POSTGRES_DB: ${POSTGRES_DB:-opportunity_radar_alpha}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - opportunity_radar_alpha_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alpha} -d ${POSTGRES_DB:-opportunity_radar_alpha}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  opportunity_radar_alpha_pgdata:
